    contents.forEach((content, index) => {

            contents.forEach(c => c.classList.remove('active'));
            tabs[index].classList.add('active');
            content.classList.add('active');

    });

            contents.forEach(c => c.classList.remove('active'));

            const newUrl = '/danh-muc-san-pham/' + contents[index].dataset.defaultCat + '/';
            window.history.replaceState({}, '', newUrl);

                const key = 'filter_' + filterName;

                    params.delete(key); // bỏ filter nếu click lại
                } else {
                    params.set(key, filterValue);

                    params.set('min_price', minPrice);
                    params.set('max_price', maxPrice);
                }

    var $ = jQuery.noConflict();
    $(document).ready(function(){
        createCaptcha();
    })
    function createCaptcha() {
        if (!document.getElementsByClassName('wpcf7-submit')) return;
        jQuery.each(jQuery(".wpcf7-submit"), function (index, val) {
            jQuery( "<div class='capcha-label'><label>Capcha</label></div>" ).insertBefore(this);
            jQuery( "<div class='uxp_captcha' data-capcha=''></div>" ).insertBefore(this);
            jQuery( "<input class='uxp-input-captcha' name='uxp-input-captcha' type='text'>" ).insertBefore(this);
            jQuery( "<p class='uxp-captcha-error'></p>" ).insertBefore(this);
        })
        
        document.querySelectorAll(".uxp_captcha").forEach(node => node.innerHTML = "")

        document.querySelectorAll(".uxp_captcha").forEach(
            function (node) {
                var capcha = createCanvas();
                node.appendChild(capcha[0])
                node.setAttribute("data-capcha", capcha[1]);
            }
        );
        
        jQuery(".wpcf7-submit").off('click').on('click',function(e) {
            e.preventDefault();
            var valInput = jQuery(this).closest('.wpcf7-form').find('.uxp-input-captcha').val();
            if (jQuery(this).closest('.wpcf7-form').find('.uxp_captcha').attr('data-capcha') === valInput) {
                $(this).parents('form').submit()
                jQuery(this).closest('.wpcf7-form').find('.uxp-captcha-error').text('');
            } else {
                jQuery(this).closest('.wpcf7-form').find('.uxp_captcha').html('');
                jQuery.each(jQuery(this).closest('.wpcf7-form').find(".uxp_captcha"), function (index, val) {
                        var capcha = createCanvas();
                        this.appendChild(capcha[0])
                        this.setAttribute("data-capcha", capcha[1]);
                });
                jQuery(this).closest('.wpcf7-form').find('.uxp-captcha-error').text('Capcha không chính xác vui lòng nhập lại !');
            }
        });
        
        return true;
    }
    function createCanvas () {
        var charsArray = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ@!#$%^&*";
        var lengthOtp = 6;
        var captcha = [];
        for (var i = 0; i < lengthOtp; i++) {
            //below code will not allow Repetition of Characters
            var index = Math.floor(Math.random() * charsArray.length + 1); //get the next character from the array
            if (captcha.indexOf(charsArray[index]) == -1) captcha.push(charsArray[index]);
            else i--;
        }
        var canv = document.createElement("canvas");
        canv.id = "captcha";
        canv.width = 200;
        canv.height = 50;
        canv.style.backgroundColor = "#fff";

        var ctx = canv.getContext("2d");
        ctx.font = "25px Georgia";
        ctx.strokeText(captcha.join(""), 50, 30);
        return [canv, captcha.join("")];
    }

  var MAP = {

    'zh-tw':'zh-TW', 'zh-hant':'zh-TW',

    document.cookie = name + '=' + encodeURIComponent(value) + '; path=/; domain=' + domain + '; expires=' + expires;
  }

  function autoSwitch(){

      if (!sessionStorage.getItem('tt_lang_reloaded')){

  }
